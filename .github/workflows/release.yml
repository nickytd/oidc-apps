name: Release

on:
  push:
    branches: [main]
    paths:
      - 'VERSION'
  workflow_dispatch:

# Serialize releases on the same ref. A push that lands while a previous run
# is still mid-flight would otherwise race on `git push` of the appVersion
# bump (non-fast-forward rejection seen in 27600474172).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "${VERSION}" == *-dev* ]]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
          elif git ls-remote --exit-code --tags origin "${VERSION}" > /dev/null; then
            # Tag already exists upstream — this VERSION was released previously.
            # Short-circuit so manual re-dispatches don't burn ~3 minutes building
            # images that the release job will then refuse to tag.
            echo "Tag ${VERSION} already exists; skipping release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip release
        if: steps.version.outputs.release == 'false'
        run: echo "Skipping release for VERSION=${{ steps.version.outputs.version }} (dev version or tag already exists)."

      - name: Login to GHCR
        if: steps.version.outputs.release == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update chart appVersion
        if: steps.version.outputs.release == 'true'
        run: |
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" charts/oidc-apps/Chart.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/oidc-apps/Chart.yaml
          git diff --cached --quiet || git commit -m "chore: bump chart appVersion to ${{ steps.version.outputs.version }}"
          git push

      - name: Push Helm chart as OCI artifact
        if: steps.version.outputs.release == 'true'
        run: |
          helm package charts/oidc-apps
          helm push oidc-apps-*.tgz oci://ghcr.io/nickytd/oidc-apps/charts

  build:
    needs: prepare
    if: needs.prepare.outputs.release == 'true'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          VERSION=${{ needs.prepare.outputs.version }}

          docker build \
            --platform ${{ matrix.platform }} \
            --tag ghcr.io/nickytd/oidc-apps/oidc-apps:${VERSION}-${{ matrix.suffix }} \
            -f Dockerfile.oidc-apps .
          docker push ghcr.io/nickytd/oidc-apps/oidc-apps:${VERSION}-${{ matrix.suffix }}

          docker build \
            --platform ${{ matrix.platform }} \
            --tag ghcr.io/nickytd/oidc-apps/kube-rbac-proxy:${VERSION}-${{ matrix.suffix }} \
            -f Dockerfile.watcher .
          docker push ghcr.io/nickytd/oidc-apps/kube-rbac-proxy:${VERSION}-${{ matrix.suffix }}

  manifest:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-platform manifests
        run: |
          VERSION=${{ needs.prepare.outputs.version }}

          docker manifest create ghcr.io/nickytd/oidc-apps/oidc-apps:${VERSION} \
            ghcr.io/nickytd/oidc-apps/oidc-apps:${VERSION}-amd64 \
            ghcr.io/nickytd/oidc-apps/oidc-apps:${VERSION}-arm64
          docker manifest push ghcr.io/nickytd/oidc-apps/oidc-apps:${VERSION}

          docker manifest create ghcr.io/nickytd/oidc-apps/oidc-apps:latest \
            ghcr.io/nickytd/oidc-apps/oidc-apps:${VERSION}-amd64 \
            ghcr.io/nickytd/oidc-apps/oidc-apps:${VERSION}-arm64
          docker manifest push ghcr.io/nickytd/oidc-apps/oidc-apps:latest

          docker manifest create ghcr.io/nickytd/oidc-apps/kube-rbac-proxy:${VERSION} \
            ghcr.io/nickytd/oidc-apps/kube-rbac-proxy:${VERSION}-amd64 \
            ghcr.io/nickytd/oidc-apps/kube-rbac-proxy:${VERSION}-arm64
          docker manifest push ghcr.io/nickytd/oidc-apps/kube-rbac-proxy:${VERSION}

          docker manifest create ghcr.io/nickytd/oidc-apps/kube-rbac-proxy:latest \
            ghcr.io/nickytd/oidc-apps/kube-rbac-proxy:${VERSION}-amd64 \
            ghcr.io/nickytd/oidc-apps/kube-rbac-proxy:${VERSION}-arm64
          docker manifest push ghcr.io/nickytd/oidc-apps/kube-rbac-proxy:latest

  release:
    needs: [prepare, manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin main

      - name: Create git tag
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          if git ls-remote --exit-code --tags origin "${VERSION}" > /dev/null; then
            echo "Tag ${VERSION} already exists; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${VERSION}" -m "Release ${VERSION}"
          git push origin "${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
