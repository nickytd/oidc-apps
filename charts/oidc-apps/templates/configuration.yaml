---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "oidc-apps.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oidc-apps.certificateLabels" . | nindent 4 }}
type: opaque
stringData:
  controller.yaml: |
    global:
      {{- toYaml .Values.global | nindent 6 }}
    targets:
      {{- toYaml .Values.targets  | nindent 6 }}