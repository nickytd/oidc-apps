name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Lint
        run: make lint

      - name: Unit tests
        run: make test

      - name: Integration tests
        run: make envtest

      - name: Build binaries
        run: |
          make build
          make build-watcher

      - name: Build Docker images
        run: make docker-images
