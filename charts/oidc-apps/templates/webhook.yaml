---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "oidc-apps.fullname" . }}
  labels:
    {{- include "oidc-apps.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.certificate.create }}
    cert-manager.io/inject-ca-from: {{ include "oidc-apps.certificateRef" . }}
    {{- end }}
webhooks:
  - name: {{ include "oidc-apps.fullname" . }}-pods.oidc-apps.io
    clientConfig:
      service:
        name: {{ include "oidc-apps.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path: /oidc-mutate-v1-pod
        port: {{ .Values.service.port | int }}
      caBundle:
    rules:
      - operations: [ "CREATE", "UPDATE" ]
        apiGroups: [ "" ]
        apiVersions: [ "v1" ]
        resources: [ "pods" ]
    {{- with .Values.webhook.objectSelector }}
    objectSelector:
    {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- if .Values.webhook.namespaceSelector }}
    namespaceSelector:
    {{- toYaml .Values.webhook.namespaceSelector | nindent 6 }}
    {{- else }}
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - {{ .Release.Namespace }}
    {{- end }}
    sideEffects: NoneOnDryRun
    admissionReviewVersions:
      - v1
    reinvocationPolicy: IfNeeded
  {{- if .Values.vpa.enabled }}
  - name: {{ include "oidc-apps.fullname" . }}-vpas.oidc-apps.io
    clientConfig:
      service:
        name: {{ include "oidc-apps.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path: /oidc-mutate-v1-vpa
        port: {{ .Values.service.port | int }}
      caBundle:
    rules:
      - operations: [ "CREATE", "UPDATE" ]
        apiGroups: [ "autoscaling.k8s.io" ]
        apiVersions: [ "v1" ]
        resources: [ "verticalpodautoscalers" ]
    {{- with .Values.webhook.objectSelector }}
    objectSelector:
    {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- if .Values.webhook.namespaceSelector }}
    namespaceSelector:
    {{- toYaml .Values.webhook.namespaceSelector | nindent 6 }}
    {{- else }}
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - {{ .Release.Namespace }}
    {{- end }}
    sideEffects: NoneOnDryRun
    admissionReviewVersions:
      - v1
    reinvocationPolicy: IfNeeded
  {{- end }}
