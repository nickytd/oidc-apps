---
{{- if .Values.certificate.create -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "oidc-apps.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oidc-apps.certificateLabels" . | nindent 4 }}
spec:
  dnsNames:
    - {{ include "oidc-apps.fullname" . }}.svc
    - {{ include "oidc-apps.fullname" . }}.{{.Release.Namespace}}.svc
    - {{ include "oidc-apps.fullname" . }}.{{.Release.Namespace}}.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: {{ include "oidc-apps.clusterRoleName" . }}
  secretName: {{ include "oidc-apps.certificateSecretName" . }}
{{- end }}