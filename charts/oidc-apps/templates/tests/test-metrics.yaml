---
{{- if .Values.metrics.enableScraping }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "oidc-apps.fullname" . }}-test-metrics"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oidc-apps.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.5.0
      command: ['curl']
      args:
        - '--fail'
        - '--silent'
        - '--show-error'
        - '--max-time'
        - '5'
        - 'http://{{ include "oidc-apps.fullname" . }}.{{ .Release.Namespace }}.svc:{{ .Values.metrics.port }}/metrics'
{{- end }}
