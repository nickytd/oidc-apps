global:
  domainName: "domain.org"
  oauth2Proxy:
    scope: "openid email"
    clientId: "client-id"
    clientSecret: "client-secret"
    redirectUrl: "https://app.org/oauth2/callback"
    oidcIssuerUrl: "https://oidc-provider.org"
  kubeRbacProxy:
    kubeConfigStr: Imt1YmVjb25maWci
    kubeSecretRef:
      name: "kubeconfig"
  oidcCABundle: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCi4uLgotLS0tLUVORCBDRVJUSUZJQ0FURS0tLS0tCg==
  oidcCASecretRef:
    name: "oidc-ca"

targets:
  # A target that shall inherit the configuration from the root level
  - name: "test-01"

 # A target with concrete configuration
  - name: "test-02"
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchExpressions:
        - {key: "app.kubernetes.io/name", operator: "In", values: ["test-02"]}
    targetPort: 8443
    targetProtocol: https
    ingress:
      create: true
      hostPrefix: "test-02-prefix"
      tlsSecretRef:
        name: "ingress-tls"
    oauth2Proxy:
      scope: "openid email target"
      clientId: "client-id-target"
      clientSecret: "client-secret-target"
      redirectUrl: "https://app.org/oauth2/callback"
      oidcIssuerUrl: "https://oidc-provider-target.org"
      sslInsecureSkipVerify: true
      insecureOidcSkipIssuerVerification: true
      insecureOidcSkipNonce: true
    kubeRbacProxy:
      kubeConfigStr: a3ViZWNvbmZpZy10YXJnZXQK
      kubeSecretRef:
        name: "target-kubeconfig"
    oidcCASecretRef:
      name: "target-oidc-ca"

  # A target with specific ingress host
  - name: test-03
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-03
    ingress:
      host: "this.overwrites"

  # A target without explicit ingress host
  - name: test-04
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-04

  # A target with HTTPRoute configuration
  - name: test-05
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-05
    httpRoute:
      create: true
      hostPrefix: "test-05-prefix"
      parentRefs:
        - name: "my-gateway"
          namespace: "gateway-system"
          sectionName: "https"

  # A target with specific HTTPRoute host
  - name: test-06
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-06
    httpRoute:
      create: true
      host: "custom.httproute.host"
      parentRefs:
        - name: "another-gateway"

  # A target with HTTPRoute but empty parentRefs (for testing validation warning)
  - name: test-07
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-07
    httpRoute:
      create: true
      hostPrefix: "test-07-prefix"

  # A target with ingress defaultPath
  - name: test-08
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-08
    ingress:
      create: true
      defaultPath: "/select/vmui"
      tlsSecretRef:
        name: "ingress-tls"

  # A target with HTTPRoute defaultPath
  - name: test-09
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-09
    httpRoute:
      create: true
      defaultPath: "/dashboard"
      parentRefs:
        - name: "my-gateway"
          namespace: "gateway-system"

  # A target with ingress annotations and labels
  - name: test-10
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-10
    targetPort: 3000
    ingress:
      create: true
      annotations:
        nginx.ingress.kubernetes.io/rewrite-target: "/"
        cert-manager.io/cluster-issuer: "letsencrypt"
      labels:
        app.kubernetes.io/component: "ingress"
        environment: "production"
      tlsSecretRef:
        name: "ingress-tls"
      ingressClassName: "nginx"

  # A target with HTTPRoute annotations, labels and managed gateway fallback
  - name: test-11
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-11
    targetPort: 8080
    httpRoute:
      create: true
      hostPrefix: "test-11-prefix"
      annotations:
        gateway.networking.k8s.io/purpose: "testing"
      labels:
        route-type: "managed"

  # A target with oidcCABundle at target level
  - name: test-12
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-12
    oidcCABundle: dGFyZ2V0LWNhLWJ1bmRsZQ==
