{{- if .Values.clusterRole.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "oidc-apps.clusterRoleName" . }}
  labels:
    {{- include "oidc-apps.labels" . | nindent 4 }}
rules:
  - apiGroups: [ "" ]
    resources: [ "services","secrets","events" ]
    verbs: [ "create", "get", "list", "watch", "update", "patch", "delete" ]
  - apiGroups: [ "apps" ]
    resources: [ "deployments","statefulsets", "replicasets" ]
    verbs: [ "get", "list", "watch" ]
  - apiGroups: [ "networking.k8s.io" ]
    resources: [ "ingresses" ]
    verbs: [ "create", "get", "list", "watch", "update", "patch", "delete" ]
  - apiGroups: [ "" ]
    resources: [ "namespaces", "pods" ]
    verbs: [ "get","list","patch", "watch", "update" ]
  - apiGroups: [ "coordination.k8s.io" ]
    resources: [ "leases" ]
    verbs: [ "create", "get", "list", "update", "patch", "watch", "delete" ]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations"]
    verbs: [ "get","list","watch","update" ]
  {{- if .Values.vpa.enabled }}
  - apiGroups: [ "autoscaling.k8s.io" ]
    resources: [ "verticalpodautoscalers" ]
    verbs: [ "get", "list", "watch", "update", "patch" ]
  {{- end }}
  {{- if and .Values.global .Values.global.gateway .Values.global.gateway.httpRoutes .Values.global.gateway.httpRoutes.enabled }}
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: [ "create", "get", "list", "watch", "update", "patch", "delete" ]
  {{- if .Values.global.gateway.managed }}
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways"]
    verbs: [ "create", "get", "list", "watch", "update", "patch", "delete" ]
  {{- end }}
  {{- end }}
{{- end }}
