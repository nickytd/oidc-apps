---
apiVersion: v1
kind: Namespace
metadata:
  name: dex
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dex-config
  namespace: dex
data:
  config.yaml: |
    issuer: https://dex.127.0.0.1.nip.io

    storage:
      type: memory

    web:
      http: 0.0.0.0:5556

    staticClients:
      - id: grafana
        name: Grafana
        secret: grafana-secret
        redirectURIs:
          - https://grafana-monitoring.127.0.0.1.nip.io/oauth2/callback

    staticPasswords:
      - email: user@oidc-apps.io
        hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W"
        username: user
        userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"

    enablePasswordDB: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex
  namespace: dex
  labels:
    app: dex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dex
  template:
    metadata:
      labels:
        app: dex
    spec:
      containers:
        - name: dex
          image: ghcr.io/dexidp/dex:v2.41.1
          args:
            - dex
            - serve
            - /etc/dex/config.yaml
          ports:
            - containerPort: 5556
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/dex
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: dex-config
---
apiVersion: v1
kind: Service
metadata:
  name: dex
  namespace: dex
spec:
  selector:
    app: dex
  ports:
    - name: http
      port: 5556
      targetPort: 5556
