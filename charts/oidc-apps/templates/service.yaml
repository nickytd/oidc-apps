---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "oidc-apps.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oidc-apps.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
  {{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port | int }}
      targetPort: webhook
      protocol: TCP
      name: webhook
    {{- if .Values.metrics.enableScraping }}
    - port: {{ .Values.metrics.port | int }}
      protocol: TCP
      name: metrics
    {{- end }}
  selector:
    {{- include "oidc-apps.selectorLabels" . | nindent 4 }}
